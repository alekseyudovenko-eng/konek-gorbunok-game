<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конёк-Горбунок: Волшебное приключение</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Интерфейс: счет и уровень -->
        <div id="ui-layer">
            <div id="score">Собрано предметов: <span id="score-value">0</span></div>
            <div id="level">Уровень: <span id="level-value">1</span></div>
        </div>
        
        <!-- Холст для игры -->
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <!-- Экран приветствия / паузы -->
        <div id="start-screen" class="overlay">
            <h1>Конёк-Горбунок</h1>
            <p>Помоги Коньку собрать волшебные предметы!</p>
            <p>Управление: Стрелки или WASD</p>
            <button id="start-btn">Начать игру</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
